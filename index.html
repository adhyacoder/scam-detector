<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scam Detector</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h2 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            resize: none;
            box-sizing: border-box;
            font-size: 14px;
            margin-bottom: 15px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
        }
        .scam {
            background-color: #fde8e8;
            color: #e53e3e;
            border: 1px solid #f8b4b4;
        }
        .safe {
            background-color: #def7ec;
            color: #03543f;
            border: 1px solid #84e1bc;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Scam & Fraud Message Detector</h2>
        <p>Paste the suspicious message or link below to check if it is safe:</p>
        
        <form method="POST" action="/">
            <textarea name="message" placeholder="Paste your message here..." required>{{ user_message }}</textarea>
            <button type="submit">Check Now</button>
        </form>
{% if result %}
    <div class="result">
        {{ result }}
    </div>
{% endif %}
</body>
</html>
